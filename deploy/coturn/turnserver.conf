# Replace these placeholders before production deployment.
listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET

realm=webrtc.local
server-name=webrtc.local

# Set this to the public IP of the machine that exposes coturn.
# For one-to-one NAT, use: external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=CHANGE_ME_PUBLIC_IP

min-port=49152
max-port=49200

no-multicast-peers
stale-nonce

log-file=stdout
verbose
